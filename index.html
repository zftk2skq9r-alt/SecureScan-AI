<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SecureScan AI</title>

<style>
/* FIXED CENTERING (NO CORNER ZOOM) */
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: radial-gradient(circle at top, #141a2a, #07090f);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  color: #eaeaea;

  overflow-x: hidden;
}

/* MAIN APP */
.app {
  width: 760px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  backdrop-filter: blur(18px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  padding: 26px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}

.logo {
  width: 26px;
  height: 26px;
  background: linear-gradient(135deg, #4c7dff, #8a5cff);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

.title {
  font-size: 18px;
  font-weight: 600;
}

/* INPUT (90%) */
textarea {
  width: 92%;
  height: 92px;
  display: block;
  margin: 10px auto;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 12px;
  color: white;
  outline: none;
}

/* BUTTON ROW */
.row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}

button {
  flex: 1;
  padding: 11px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 500;
}

.scan { background: linear-gradient(135deg, #4c7dff, #6a5cff); color: white; }
.guide { background: rgba(255,255,255,0.08); color: white; }
.ai { background: rgba(255,255,255,0.06); color: white; }

/* GUIDE */
.doc {
  display: none;
  margin-top: 14px;
  padding: 14px;
  border-radius: 14px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.08);
}

/* SCAN OUTPUT */
.output {
  margin-top: 16px;
  padding: 14px;
  border-radius: 14px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.08);
}

/* AI PANEL */
.ai-panel {
  position: fixed;
  right: -380px;
  top: 0;
  width: 340px;
  height: 100%;
  background: rgba(10,12,18,0.92);
  backdrop-filter: blur(18px);
  border-left: 1px solid rgba(255,255,255,0.08);
  transition: 0.35s ease;
  display: flex;
  flex-direction: column;
}

.ai-panel.open {
  right: 0;
}

/* AI HEADER WITH BACK BUTTON */
.ai-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-weight: 600;
}

.back-btn {
  background: rgba(255,255,255,0.08);
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 12px;
}

.back-btn:hover {
  background: rgba(255,255,255,0.15);
}

.ai-chat {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  font-size: 14px;
}

/* AI INPUT */
.ai-input {
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.ai-input input {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  color: white;
  outline: none;
}

/* SMALL SEND BUTTON */
.ai-input button {
  width: 52px;
  font-size: 12px;
  padding: 8px;
  background: #4c7dff;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="logo"></div>
    <div class="title">SecureScan AI</div>
  </div>

  <textarea id="input" placeholder="Paste suspicious link or text..."></textarea>

  <div class="row">
    <button class="scan" onclick="scan()">Scan</button>
    <button class="guide" onclick="toggleGuide()">Guide</button>
    <button class="ai" onclick="toggleAI()">AI</button>
  </div>

  <div class="doc" id="doc">
    <h3>Phishing Guide</h3>
    <p>Watch for fake domains, Unicode spoofing, and scam links.</p>
  </div>

  <div class="output" id="out"></div>

</div>

<!-- AI PANEL -->
<div class="ai-panel" id="ai">

  <div class="ai-header">
    <button class="back-btn" onclick="toggleAI()">← Back</button>
    <span>Phishing AI</span>
  </div>

  <div class="ai-chat" id="chat"></div>

  <div class="ai-input">
    <input id="msg" placeholder="Ask..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

/* SCANNER */
function scan() {
  const text = document.getElementById("input").value;
  let risk = 0;
  let out = "";

  for (let c of text) {
    const code = c.codePointAt(0);

    const bad =
      (code >= 0x0400 && code <= 0x04FF) ||
      (code >= 0x0370 && code <= 0x03FF);

    if (bad) {
      out += `<span style="color:#ff4d4d;text-decoration:underline">${c}</span>`;
      risk++;
    } else {
      out += c;
    }
  }

  let level = risk === 0 ? "LOW" : risk < 3 ? "MEDIUM" : "HIGH";

  document.getElementById("out").innerHTML =
    `<b>Risk:</b> ${level}<br><br>${out}`;
}

/* GUIDE */
function toggleGuide() {
  const d = document.getElementById("doc");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

/* AI PANEL */
function toggleAI() {
  document.getElementById("ai").classList.toggle("open");
}

/* AI SEND */
async function send() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const text = input.value.trim();
  if (!text) return;

  chat.innerHTML += `<div>You: ${text}</div>`;
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  chat.innerHTML += `<div>AI: ${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
