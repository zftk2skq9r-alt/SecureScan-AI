<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureScan AI</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #0f172a, #05070d);
  font-family: system-ui, Arial;
  color: #e5e7eb;
}

/* FIXED CENTER (NO CORNER BUG) */
.wrapper {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* MAIN CARD */
.app {
  width: 100%;
  max-width: 820px;

  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;

  padding: 24px;

  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* TITLE */
h2 {
  margin: 0 0 10px;
}

/* INPUT */
textarea {
  width: 100%;
  height: 110px;

  margin-top: 10px;

  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;

  padding: 12px;
  color: white;

  outline: none;
  resize: none;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 14px;

  border: none;
  border-radius: 10px;

  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;

  cursor: pointer;
  font-weight: 500;
}

button:hover {
  opacity: 0.9;
}

/* RESULT CARD */
.card {
  margin-top: 15px;
  padding: 14px;

  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
}

/* AI PANEL */
.ai {
  margin-top: 15px;
  padding: 14px;

  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
}

/* CHAT BOX */
#chat {
  height: 180px;
  overflow-y: auto;

  padding: 8px;

  background: rgba(0,0,0,0.3);
  border-radius: 10px;

  margin-bottom: 10px;
}

/* INPUT ROW */
.row {
  display: flex;
  gap: 8px;
}

.row input {
  flex: 1;

  padding: 10px;

  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);

  background: rgba(0,0,0,0.3);
  color: white;

  outline: none;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="app">

<h2>SecureScan AI 🛡</h2>

<textarea id="input" placeholder="Paste suspicious link or message..."></textarea>

<button onclick="scan()">Scan</button>

<div id="out"></div>

<!-- AI -->
<div class="ai">
  <h3>AI Security Assistant</h3>

  <div id="chat"></div>

  <div class="row">
    <input id="msg" placeholder="Ask about scams..." />
    <button onclick="send()">Send</button>
  </div>
</div>

</div>
</div>

<script>

let lastReport = "";

/* SCAN FUNCTION */
function scan() {
  const text = document.getElementById("input").value;

  let risk = 0;
  let issues = [];

  if (text.toLowerCase().includes("free")) {
    risk += 20;
    issues.push("Suspicious keyword: free");
  }

  if (text.toLowerCase().includes("nitro")) {
    risk += 30;
    issues.push("Fake reward scam");
  }

  if (/[а-яА-Я]/.test(text)) {
    risk += 40;
    issues.push("Unicode spoofing detected");
  }

  let level = risk < 30 ? "LOW" : risk < 70 ? "MEDIUM" : "HIGH";

  lastReport = `Risk: ${risk}/100\nLevel: ${level}\nIssues: ${issues.join(", ") || "None"}`;

  document.getElementById("out").innerHTML = `
    <div class="card">
      <b>Scan Result</b><br><br>
      ${lastReport.replaceAll("\n","<br>")}
    </div>
  `;
}

/* 🧠 OFFLINE AI */
function ai(message) {
  const msg = message.toLowerCase();

  if (lastReport.includes("HIGH")) {
    return "⚠ HIGH RISK detected. This may be a phishing attempt.";
  }

  if (msg.includes("phishing")) {
    return "Phishing is fake websites/messages used to steal personal data.";
  }

  if (msg.includes("nitro") || msg.includes("free")) {
    return "Be careful — fake rewards are commonly used in scams.";
  }

  if (msg.includes("safe")) {
    return "Always verify links, check domains, and avoid unknown pages.";
  }

  return "Ask me about scams, phishing, or suspicious links.";
}

/* CHAT */
function send() {
  const msg = document.getElementById("msg").value;
  const chat = document.getElementById("chat");

  if (!msg) return;

  chat.innerHTML += `<div><b>You:</b> ${msg}</div>`;

  const reply = ai(msg);

  chat.innerHTML += `<div><b>AI:</b> ${reply}</div>`;

  document.getElementById("msg").value = "";
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
